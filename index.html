<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Handwriting AI Canvas iPad Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" id="app">
    <div class="stage" id="stage">
      <svg id="inkLayer" aria-label="手写画布"></svg>
      <svg id="arrowLayer" aria-label="上下文连接"></svg>
      <div id="uiLayer" aria-label="AI 节点层"></div>
    </div>

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>
          <strong>可视化手写 Agent 画布</strong>
          <div class="context-chip" id="modeReadout">钢笔 · 执行经理</div>
        </div>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span id="statusText">Apple Pencil / 触控已启用</span>
      </div>
    </header>

    <aside class="floating-agents" aria-label="Agent 角色栏">
      <div id="agentList"><!-- JS 动态渲染 --></div>
      <button class="settings-btn" id="settingsBtn">设置</button>
    </aside>

    <section class="prompt-dock" aria-label="输入栏">
      <div class="prompt-row">
        <button id="voiceBtn" aria-label="语音输入">声</button>
        <input id="typedPrompt" placeholder="打字输入，或直接在画布上手写" />
        <button id="sendPrompt" aria-label="提交">↵</button>
      </div>
    </section>

    <nav class="toolbar" aria-label="画布工具栏">
      <button class="tool" data-tool="move" aria-label="移动">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="1.5"/><path d="M12 2v7M12 15v7M2 12h7M15 12h7M9 5l3-3 3 3M9 19l3 3 3-3M5 9l-3 3 3 3M19 9l3 3-3 3"/></svg>
        <span class="tip">移动</span>
      </button>
      <button class="tool active" data-tool="pen" aria-label="钢笔">
        <svg viewBox="0 0 24 24" fill="none"><path d="M16.5 3.5l4 4L9 19l-4.5.5L5 15z"/><path d="M13 7l4 4"/></svg>
        <span class="tip">钢笔</span>
      </button>
      <button class="tool" data-tool="select" aria-label="套索">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8" cy="8" r="1.2"/></svg>
        <span class="tip">套索</span>
      </button>
      <button class="tool" data-tool="eraser" aria-label="橡皮">
        <svg viewBox="0 0 24 24" fill="none"><path d="M20 20H6.5L3 16.5l8.5-8.5 5.5 5.5z"/><path d="M9 10l5 5"/></svg>
        <span class="tip">橡皮</span>
      </button>
      <span class="separator"></span>
      <button class="tool" id="undoBtn" aria-label="撤销">
        <svg viewBox="0 0 24 24" fill="none"><path d="M8 14L3 8l5-6"/><path d="M3 8h10a6 6 0 010 12h-3"/></svg>
        <span class="tip">撤销</span>
      </button>
      <button class="tool" id="clearBtn" aria-label="清空手写">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M5 6l1 14h12l1-14"/></svg>
        <span class="tip">清空手写</span>
      </button>
      <span class="color-dot" id="inkDot" style="background:#1f2529"></span>
    </nav>

    <div class="lasso-label" id="lassoPanel">
      <textarea id="ocrText" placeholder="马克笔扫过的内容会在这里识别，可修正后调用 Agent"></textarea>
      <div class="lasso-actions">
        <button class="mini-btn primary" id="generateFromLasso">调用当前 Agent</button>
        <button class="mini-btn" id="cancelLasso">取消</button>
      </div>
    </div>

    <div class="scope-popover" id="scopePopover">
      <h3>上下文作用域</h3>
      <p id="scopeText">悬浮节点或箭头时显示模型会携带的上下文。</p>
    </div>

    <!-- 箭头编辑面板 -->
    <div class="arrow-edit-panel" id="arrowEditPanel">
      <div class="arrow-edit-header">
        <span>箭头关系</span>
        <button id="closeArrowPanel" class="close-btn">✕</button>
      </div>
      <select id="arrowTypeSelect" class="arrow-type-select">
        <option value="derive">派生</option>
        <option value="reference">引用</option>
        <option value="supplement">补充</option>
        <option value="compare">对比</option>
        <option value="merge">合并</option>
      </select>
      <div class="arrow-edit-actions">
        <button class="mini-btn" id="reverseArrowBtn">反转方向</button>
        <button class="mini-btn danger" id="deleteArrowBtn">删除连接</button>
      </div>
    </div>

    <!-- Agent 编辑面板 -->
    <div class="agent-edit-panel" id="agentEditPanel">
      <div class="agent-edit-header">
        <h3 id="editAgentTitle">编辑 Agent</h3>
        <button id="closeAgentEditPanel" class="close-btn">✕</button>
      </div>
      <input type="hidden" id="editAgentKey" />
      <div class="agent-edit-field">
        <label>名称</label>
        <input id="editAgentName" type="text" placeholder="Agent 名称" />
      </div>
      <div class="agent-edit-field">
        <label>简称（1-2字）</label>
        <input id="editAgentShort" type="text" maxlength="2" placeholder="简称" />
      </div>
      <div class="agent-edit-field">
        <label>颜色</label>
        <input id="editAgentColor" type="color" />
      </div>
      <div class="agent-edit-field">
        <label>角色说明</label>
        <textarea id="editAgentRoleDesc" rows="2" placeholder="描述 Agent 的角色和能力"></textarea>
      </div>
      <div class="agent-edit-field">
        <label>Skills（用逗号或顿号分隔）</label>
        <textarea id="editAgentSkills" rows="2" placeholder="例如：问题拆解、逻辑梳理、行动建议"></textarea>
      </div>
      <div class="agent-edit-actions">
        <button class="mini-btn primary" id="saveAgentEdit">保存</button>
        <button class="mini-btn" id="resetAgentDefault">恢复默认</button>
      </div>
    </div>

    <section class="settings-sheet" id="settingsSheet">
      <h2>设置</h2>
      <div class="settings-status" id="settingsStatus">
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusLabel">正在检测服务...</span>
      </div>

      <div class="settings-section-title">交互设置</div>

      <label class="toggle-row">
        <span>自动 OCR 修正</span>
        <input type="checkbox" id="toggleOcrCorrection" checked />
        <span class="toggle"></span>
      </label>
      <label class="toggle-row">
        <span>生成时保留手写来源</span>
        <input type="checkbox" id="toggleKeepSource" checked />
        <span class="toggle"></span>
      </label>
      <label class="toggle-row">
        <span>剪枝后从记忆中移除</span>
        <input type="checkbox" id="togglePruneMemory" checked />
        <span class="toggle"></span>
      </label>
      <label class="toggle-row">
        <span>Apple Pencil 压感笔迹</span>
        <input type="checkbox" id="togglePressure" checked />
        <span class="toggle"></span>
      </label>

      <!-- 开发者模式：由后端 ENABLE_DEV_SETTINGS 控制，默认隐藏 -->
      <div id="devSettingsSection" style="display:none">
        <div class="settings-section-title" style="margin-top:12px">开发者 API 配置</div>
        <div class="settings-group">
          <label class="field-label" for="apiKeyInput">API Key</label>
          <input class="settings-input" id="apiKeyInput" type="password" placeholder="输入豆包 API Key" autocomplete="off" />
        </div>
        <div class="settings-group">
          <label class="field-label" for="endpointInput">接入点名称</label>
          <input class="settings-input" id="endpointInput" type="text" placeholder="例如：ep-20250101123456-xxxxx" autocomplete="off" />
        </div>
        <button class="settings-save" id="settingsSaveBtn">保存到服务端</button>
        <p class="settings-hint">仅当 ENABLE_DEV_SETTINGS=true 时显示。生产环境请在 .env 中配置。</p>
      </div>
    </section>

    <svg id="dragLayer" aria-hidden="true"></svg>
    <div class="toast" id="toast"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
